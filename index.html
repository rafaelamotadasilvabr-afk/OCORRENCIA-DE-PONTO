<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>OCORRÊNCIA DE PONTO</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:20px;
    background:#f4f6f9;
    font-family:Arial, Helvetica, sans-serif;
    color:#000;
}

.container{
    max-width:900px;
    margin:auto;
    text-align:left;
}

.ficha{
    width:210mm;
    min-height:297mm;
    margin:auto;
    background:#fff;
    padding:18mm 10mm 20mm 10mm;
    border:1px solid #ccc;
    position:relative;
}

.topo{
    position:relative;
    min-height:90px;
    margin-bottom:10px;
}

.logo-box{
    position:absolute;
    top:0;
    left:0;
    width:150px;
    height:90px;
    display:flex;
    align-items:flex-start;
    justify-content:center;
    overflow:hidden;
}

.logo-box img{
    max-width:115px;
    max-height:80px;
    width:auto;
    height:auto;
    display:block;
}

.titulo{
    text-align:center;
    font-family:Arial, Helvetica, sans-serif;
    font-weight:bold;
    text-decoration:underline;
    font-size:16px;
    line-height:90px;
}

.bloco{
    border:1px solid #000;
    padding:14px 10px 10px 10px;
    margin-top:10px;
    position:relative;
}

.bloco-titulo{
    position:absolute;
    top:-9px;
    left:12px;
    background:#fff;
    padding:0 5px;
    font-family:Arial, Helvetica, sans-serif;
    font-size:12px;
    font-weight:bold;
}

.linha{
    display:flex;
    gap:10px;
    margin-top:10px;
    align-items:flex-end;
    flex-wrap:wrap;
}

label,
span,
.pergunta{
    font-family:Arial, Helvetica, sans-serif;
    font-size:13px;
    font-weight:normal;
    white-space:nowrap;
}

input,
select{
    border:none;
    border-bottom:1px solid #000;
    background:transparent;
    height:24px;
    font-size:13px;
    padding:2px 3px;
    color:#000;
    font-family:Arial, Helvetica, sans-serif;
    font-weight:normal;
}

select{
    background:#fff;
}

.w-razao{
    width:370px;
}

.w-endereco{
    width:540px;
}

.w-nome{
    width:330px;
}

.w-cargo{
    width:170px;
}

.w-cpf{
    width:130px;
}

.w-data{
    width:150px;
}

.pergunta{
    margin-top:18px;
}

.opcoes{
    display:flex;
    gap:18px;
    margin-top:12px;
    flex-wrap:wrap;
}

.opcoes label{
    display:flex;
    align-items:center;
    gap:5px;
}

.linha-texto{
    margin-top:18px;
    display:flex;
    gap:10px;
    align-items:flex-end;
    flex-wrap:wrap;
}

.linha-texto input{
    flex:1;
    min-width:250px;
}

.assinaturas{
    margin-top:22px;
}

.assinatura{
    margin-top:14px;
    display:flex;
    gap:10px;
    align-items:flex-end;
}

.traco{
    flex:1;
    border-bottom:1px solid #000;
    height:20px;
}

.dupla{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
}

.area-botao{
    max-width:900px;
    margin:20px auto 0 auto;
    text-align:center;
}

.btn-print{
    width:100%;
    max-width:300px;
    height:40px;
    background:#000;
    color:#fff;
    border:none;
    font-size:14px;
    cursor:pointer;
    font-family:Arial, Helvetica, sans-serif;
}

@media print{
    @page{
        size:A4 portrait;
        margin:0;
    }

    body{
        background:#fff;
        padding:0;
        font-family:Arial, Helvetica, sans-serif;
    }

    .ficha{
        border:none;
        margin:0;
    }

    input,
    select,
    label,
    span,
    .pergunta{
        font-family:Arial, Helvetica, sans-serif;
    }

    .area-botao,
    .btn-print{
        display:none !important;
    }
}
</style>
</head>
