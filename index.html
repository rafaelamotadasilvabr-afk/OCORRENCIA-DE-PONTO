<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>OCORRÊNCIA DE PONTO</title>

<style>
body{
    margin:0;
    padding:20px;
    background:#f4f6f9;
    font-family:Arial;
}

.container{
    max-width:900px;
    margin:auto;
}

.ficha{
    width:210mm;
    min-height:297mm;
    margin:auto;
    background:#fff;
    padding:20mm 15mm;
    border:1px solid #ccc;
}

.topo{
    display:grid;
    grid-template-columns:200px 1fr 40px;
    align-items:center;
    margin-bottom:20px;
}

.logo-box{
    display:flex;
    align-items:flex-start;
    height:80px;
}

.logo-box img{
    height:80px;
    transform:scale(2.0);
    transform-origin:left top;
    margin-top:-10px;
}

.titulo{
    text-align:center;
    font-weight:bold;
    text-decoration:underline;
}

.bloco{
    border:1px solid #000;
    padding:10px;
    margin-top:15px;
    position:relative;
}

.bloco-titulo{
    position:absolute;
    top:-10px;
    left:10px;
    background:#fff;
    padding:0 5px;
    font-size:13px;
    font-weight:bold;
}

.linha{
    display:flex;
    gap:10px;
    margin-top:10px;
    align-items:flex-end;
    flex-wrap:wrap;
}

label{
    font-size:13px;
}

input, select{
    border:none;
    border-bottom:1px solid #000;
    background:transparent;
    height:24px;
    font-size:13px;
}

select{
    background:#fff;
}

.w-razao{ width:500px;}
.w-endereco{ width:650px;}
.w-nome{ width:400px;}
.w-cargo{ width:200px;}
.w-cpf{ width:180px;}
.w-data{ width:150px;}

.pergunta{
    margin-top:20px;
    font-size:13px;
}

.opcoes{
    display:flex;
    gap:20px;
    margin-top:10px;
}

.linha-texto{
    margin-top:15px;
    display:flex;
    gap:10px;
    align-items:flex-end;
}

.linha-texto input{
    flex:1;
}

.assinaturas{
    margin-top:25px;
}

.assinatura{
    margin-top:15px;
    display:flex;
    gap:10px;
    align-items:flex-end;
}

.traco{
    flex:1;
    border-bottom:1px solid #000;
    height:20px;
}

.dupla{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

@media print{
    body{background:#fff;}
    .ficha{border:none;}
}
</style>
</head>

<body>

<div class="container">

<div class="ficha">

<div class="topo">
    <div class="logo-box">
        <img src="LogodaMarca.png">
    </div>
    <div class="titulo">Correções e lançamentos manuais</div>
</div>

<div class="bloco">
<div class="bloco-titulo">DADOS DO EMPREGADOR</div>

<div class="linha">
<label>Razão Social:</label>
<select class="w-razao">
<option>Selecionar empregador</option>
<option>EMPRESA 1 - CNPJ 00.000.000/0000-00</option>
<option>EMPRESA 2 - CNPJ 00.000.000/0000-00</option>
<option>EMPRESA 3 - CNPJ 00.000.000/0000-00</option>
<option>EMPRESA 4 - CNPJ 00.000.000/0000-00</option>
</select>
</div>

<div class="linha">
<label>Endereço:</label>
<input type="text" class="w-endereco" value="Rua Teodoro de Beaurepaire, 34, Ipiranga, São Paulo - SP, 04279-030" readonly>
</div>

</div>

<div class="bloco">
<div class="bloco-titulo">DADOS DO TRABALHADOR</div>

<div class="linha">
<label>NOME DO COLABORADOR:</label>
<select class="w-nome" onchange="preencher(this)">
<option>Selecionar</option>
<option value="1">LEONARDO PEREIRA GARCIA</option>
<option value="2">JOAO SILVA</option>
<option value="3">MARIA SOUZA</option>
</select>
</div>

<div class="linha">
<label>CARGO:</label>
<input type="text" class="w-cargo cargo" readonly>

<label>CPF:</label>
<input type="text" class="w-cpf cpf" readonly>
</div>

<div class="linha">
<label>Data Ocorrência:</label>
<input type="date" class="w-data">
</div>

</div>

<div class="pergunta">Qual registro não foi marcado</div>

<div class="opcoes">
<label><input type="radio" name="reg"> Entrada</label>
<label><input type="radio" name="reg"> Saída Intervalo</label>
<label><input type="radio" name="reg"> Retorno Intervalo</label>
<label><input type="radio" name="reg"> Saída</label>
</div>

<div class="linha-texto">
<label>Horário devido da marcação:</label>
<input type="time">
</div>

<div class="linha-texto">
<label>Justifique o motivo para a não marcação do ponto:</label>
<input type="text">
</div>

<div class="assinaturas">
<div class="assinatura">
<span>Assinatura do colaborador:</span>
<div class="traco"></div>
</div>

<div class="dupla">
<div class="assinatura">
<span>Assinatura Líder:</span>
<div class="traco"></div>
</div>

<div class="assinatura">
<span>Assinatura RH:</span>
<div class="traco"></div>
</div>
</div>
</div>

</div>

</div>

<script>
function preencher(select){
    let cpf = document.querySelector(".cpf");
    let cargo = document.querySelector(".cargo");

    if(select.value == "1"){
        cpf.value = "464.629.978-00";
        cargo.value = "Motorista";
    }
    if(select.value == "2"){
        cpf.value = "123.456.789-00";
        cargo.value = "Assistente";
    }
    if(select.value == "3"){
        cpf.value = "987.654.321-00";
        cargo.value = "Analista";
    }
}
</script>

</body>
</html>
